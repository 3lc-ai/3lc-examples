repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.4
  hooks:
    - id: ruff
      args: ["--fix"]
    - id: ruff-format

- repo: https://github.com/kynan/nbstripout
  rev: 0.8.1
  hooks:
    - id: nbstripout
      exclude: ^example-notebooks/

- repo: local
  hooks:
    - id: mypy
      name: mypy
      entry: uv run --frozen mypy .
      language: system
      types: [python]
      pass_filenames: false
