[pytest]
testpaths = tests
# Make repo-root top-level packages (e.g. `utils`) importable regardless of how
# pytest is invoked (`uv run pytest` does not put the cwd on sys.path).
pythonpath = .
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    dependent: marks tests that depend on external resources (deselect with '-m "not dependent"')
